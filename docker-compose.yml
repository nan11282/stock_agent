services:
  agent:
    build: .
    stdin_open: true
    tty: true
    environment:
      - DEEPSEEK_API_KEY_stock_agent=${DEEPSEEK_API_KEY_stock_agent}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/app/data/investment.db
      - CHROMA_PATH=/app/chroma_db
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - .:/app                       # 代码热挂载：改完直接重跑，无需 rebuild

  scheduler:
    build: .
    command: [ "python", "scheduler.py" ]
    environment:
      - DEEPSEEK_API_KEY_stock_agent=${DEEPSEEK_API_KEY_stock_agent}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=/app/data/investment.db
      - CHROMA_PATH=/app/chroma_db
      - MAIL_HOST=${MAIL_HOST:-smtp.qq.com}
      - MAIL_PORT=${MAIL_PORT:-465}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_TO=${MAIL_TO}
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - .:/app
    restart: unless-stopped
